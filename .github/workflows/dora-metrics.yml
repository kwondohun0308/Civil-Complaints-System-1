name: DORA Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      window_days:
        description: "Aggregation window in days"
        required: false
        default: "30"
      incident_label:
        description: "Issue label for incidents"
        required: false
        default: "incident"

permissions:
  contents: read
  pull-requests: read
  issues: read
  deployments: read

jobs:
  calculate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Calculate DORA metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
          DORA_WINDOW_DAYS: ${{ inputs.window_days || '30' }}
          DORA_INCIDENT_LABEL: ${{ inputs.incident_label || 'incident' }}
        run: |
          node .github/scripts/calc_dora_metrics.mjs

      - name: Upload metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: dora-metrics
          path: artifacts/dora/dora_metrics_latest.json
          if-no-files-found: error
