name: Deploy Production

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_ENV: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create deployment event
        id: create_deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref.replace('refs/heads/', ''),
              environment: process.env.DEPLOY_ENV,
              required_contexts: [],
              auto_merge: false,
              transient_environment: false,
              production_environment: true,
              description: 'Automated deployment marker from GitHub Actions',
            });
            core.setOutput('deployment_id', String(deployment.data.id));

      - name: Smoke check
        id: smoke
        run: |
          python -m compileall app scripts

      - name: Mark deployment success
        if: ${{ success() }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number('${{ steps.create_deployment.outputs.deployment_id }}'),
              state: 'success',
              environment: process.env.DEPLOY_ENV,
              description: 'Smoke check passed',
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Mark deployment failure
        if: ${{ failure() }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number('${{ steps.create_deployment.outputs.deployment_id }}'),
              state: 'failure',
              environment: process.env.DEPLOY_ENV,
              description: 'Smoke check failed',
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
