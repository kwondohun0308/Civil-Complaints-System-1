benchmark:
  name: week3_llm_model_benchmark
  description: Compare core open-source models and optional A.X candidate under identical RAG-QA conditions.
  backend: ollama
  base_url: http://localhost:11434
  temperature: 0.2
  num_predict: 256
  num_ctx: 2048
  timeout_sec: 90
  repetitions_per_case: 1
  response_format: json

models:
  - id: aihub_baseline
    model_name: aihub-local-baseline
    backend: transformers
    model_path: data/aihub_model/openchat-3.5-0106-public
    role: baseline
    note: OpenChat local GPU inference via HuggingFace Transformers.

  - id: candidate_ax4_light
    model_name: ax4-light-local:latest
    role: candidate
    note: SK Telecom A.X-4.0-Light (GGUF quantized Q3_K_S locally installed).

  - id: candidate_exaone_3_5_7_8b
    model_name: exaone3.5:7.8b-instruct
    role: candidate
    note: Korean domain-friendly model family.

  - id: candidate_gemma3_12b
    model_name: gemma3:12b
    role: candidate
    note: Recent open-source candidate with strong multilingual reasoning.

  - id: candidate_phi4_mini
    model_name: phi4-mini:3.8b-instruct
    role: candidate
    note: Small, latency-efficient model for low-resource fallback.

metrics:
  - parse_success_rate
  - answer_non_empty_rate
  - citation_match_rate
  - avg_latency_sec
  - p95_latency_sec
  - scenario_slice_metrics

outputs:
  report_json: docs/40_devlivery/evaluation/week3/model_benchmark_report_final.json
  summary_md: docs/40_devlivery/evaluation/week3/model_benchmark_summary.md
  individual_results_dir: docs/40_devlivery/evaluation/week3/
  note: "모든 출력 경로는 새 folder_structure.md 기준 (2026-03-27)"
