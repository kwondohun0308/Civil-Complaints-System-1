pipeline_id: hybrid_bm25_dense_rrf_reranked
seed: 42

stages:
  - name: bm25_retriever
    type: bm25_retriever
    params:
      collection: civil_cases_v1
      top_k: 50
      index_dir: data/bm25_index
      tokenizer: korean

  - name: dense_retriever
    type: chroma_dense
    params:
      collection: civil_cases_v1
      top_k: 50
      use_adaptive_router: false
      snippet_max_chars: 600

  - name: rrf_fusion
    type: rrf_fusion
    params:
      source_stages:
        - bm25_retriever
        - dense_retriever
      top_k: 50
      k: 60

  - name: cross_encoder_rerank
    type: cross_encoder_rerank
    params:
      model_name: BAAI/bge-reranker-v2-m3
      top_k: 10
      batch_size: 32

final:
  take_top_k: 10
