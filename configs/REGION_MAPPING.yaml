# Region normalization mapping (지역 정규화 규칙)
# Purpose: 원본 케이스의 다양한 지역명을 표준 행정 단위로 매핑
# Authority: 지방자치단체 표준 (서울, 경기, 부산 등)
# Update: 2026-03-31

# ============================================================================
# 서울 지역
# ============================================================================
서울:
  aliases:
    - 서울시
    - 서울특별시
    - Seoul
  districts:
    강남: [강남구, Gangnam]
    강동: [강동구, Gangdong]
    강북: [강북구, Gangbuk]
    강서: [강서구, Gangseo]
    관악: [관악구, Gwanak]
    광진: [광진구, Gwangjin]
    구로: [구로구, Guro]
    금천: [금천구, Geumcheon]
    노원: [노원구, Nowon]
    도봉: [도봉구, Dobong]
    동대문: [동대문구, Dongdaemun]
    동작: [동작구, Dongjak]
    마포: [마포구, Mapo]
    서대문: [서대문구, Seodaemun]
    서초: [서초구, Seocho]
    성동: [성동구, Seongdong]
    성북: [성북구, Seongbuk]
    송파: [송파구, Songpa]
    양천: [양천구, Yangcheon]
    영등포: [영등포구, Yeongdeungpo]
    용산: [용산구, Yongsan]
    은평: [은평구, Eunpyeong]
    중: [중구, Jung]
    중랑: [중랑구, Jungnang]

# ============================================================================
# 경기 지역
# ============================================================================
경기:
  aliases:
    - 경기도
    - Gyeonggi
  districts:
    수원: [수원시, Suwon]
    성남: [성남시, Seongnam]
    안양: [안양시, Anyang]
    안산: [안산시, Ansan]
    용인: [용인시, Yongin]
    부천: [부천시, Bucheon]
    광명: [광명시, Gwangmyeong]
    평택: [평택시, Pyeongtaek]
    동두천: [동두천시, Dongducheon]
    군포: [군포시, Gunpo]
    의왕: [의왕시, Uiwang]
    하남: [하남시, Hanam]
    이천: [이천시, Icheon]
    여주: [여주시, Yeoju]
    오산: [오산시, Osan]
    파주: [파주시, Paju]
    가평: [가평군, Gapyeong]
    양평: [양평군, Yangpyeong]

# ============================================================================
# 부산 지역
# ============================================================================
부산:
  aliases:
    - 부산시
    - 부산광역시
    - Busan
  districts:
    중: [중구, Jung]
    서: [서구, Seo]
    동: [동구, Dong]
    영도: [영도구, Yeongdo]
    부산진: [부산진구, Busanjin]
    동래: [동래구, Dongnae]
    남: [남구, Nam]
    북: [북구, Buk]
    해운대: [해운대구, Haeundae]
    수영: [수영구, Suyeong]
    사상: [사상구, Sasang]
    금정: [금정구, Geumjeong]
    강서: [강서구, Gangseo]
    연제: [연제구, Yeonje]
    사하: [사하구, Saha]
    기장: [기장군, Gijang]

# ============================================================================
# 기타 광역시/도
# ============================================================================
대구:
  aliases: [대구시, 대구광역시, Daegu]

인천:
  aliases: [인천시, 인천광역시, Incheon]

광주:
  aliases: [광주시, 광주광역시, Gwangju]

대전:
  aliases: [대전시, 대전광역시, Daejeon]

울산:
  aliases: [울산시, 울산광역시, Ulsan]

세종:
  aliases: [세종시, Sejong]

강원:
  aliases: [강원도, Gangwon]

충북:
  aliases: [충청북도, Chungcheongbuk]

충남:
  aliases: [충청남도, Chungcheongnam]

전북:
  aliases: [전라북도, Jeonbuk]

전남:
  aliases: [전라남도, Jeonnam]

경북:
  aliases: [경상북도, Gyeongbuk]

경남:
  aliases: [경상남도, Gyeongnam]

제주:
  aliases: [제주특별자치도, Jeju]

# ============================================================================
# 매핑 규칙
# ============================================================================
mapping_rules:
  - pattern: "^([가-힝]+)(시|도|구|군)$"
    action: "extract_and_normalize"
  - pattern: "^(서울|부산|대구|인천|광주|대전|울산|세종)$"
    action: "return_as_is"
  - pattern: "unknown|미지정|불명"
    action: "set_to_unknown"

# ============================================================================
# 검증 규칙
# ============================================================================
validation:
  required: true
  allowed_values:
    - 서울
    - 경기
    - 인천
    - 강원
    - 대구
    - 경북
    - 경남
    - 부산
    - 울산
    - 광주
    - 전북
    - 전남
    - 충북
    - 충남
    - 대전
    - 세종
    - 제주
  default: "unknown"
