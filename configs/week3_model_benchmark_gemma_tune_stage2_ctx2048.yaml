benchmark:
  name: week3_llm_model_benchmark_gemma_tune_stage2_ctx2048
  description: Gemma A/B stage2 with num_predict=128 and num_ctx=2048.
  base_url: http://localhost:11434
  temperature: 0.2
  num_predict: 128
  num_ctx: 2048
  timeout_sec: 90
  repetitions_per_case: 1
  response_format: json

models:
  - id: candidate_gemma3_12b
    model_name: gemma3:12b
    role: candidate
    note: Gemma stage2 ctx2048 benchmark.

metrics:
  - parse_success_rate
  - answer_non_empty_rate
  - citation_match_rate
  - avg_latency_sec
  - p95_latency_sec
  - scenario_slice_metrics

outputs:
  report_json: logs/evaluation/week3/gemma_stage2_ctx2048/model_benchmark_report_final.json
  summary_md: logs/evaluation/week3/gemma_stage2_ctx2048/model_benchmark_summary.md
  individual_results_dir: logs/evaluation/week3/gemma_stage2_ctx2048/
