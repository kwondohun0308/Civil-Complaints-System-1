benchmark:
  name: week3_llm_model_benchmark_phi4_tune_stage2_ctx2048
  description: Phi4 tuning run with num_predict=128 and num_ctx=2048 (no forced citation-empty failure).
  base_url: http://localhost:11434
  temperature: 0.2
  num_predict: 128
  num_ctx: 2048
  timeout_sec: 90
  repetitions_per_case: 1
  response_format: json

models:
  - id: candidate_phi4_mini
    model_name: phi4-mini:3.8b-instruct
    role: candidate
    note: Phi4 mini candidate tuned for ctx sensitivity check.

metrics:
  - parse_success_rate
  - answer_non_empty_rate
  - citation_match_rate
  - avg_latency_sec
  - p95_latency_sec
  - scenario_slice_metrics

outputs:
  report_json: logs/evaluation/week3/phi4_stage2_ctx2048/model_benchmark_report_final.json
  summary_md: logs/evaluation/week3/phi4_stage2_ctx2048/model_benchmark_summary.md
  individual_results_dir: logs/evaluation/week3/phi4_stage2_ctx2048/